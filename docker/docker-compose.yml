services:
  dynamodb-local:
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    image: "amazon/dynamodb-local:latest"
    container_name: dynascope-dynamodb
    restart: unless-stopped
    user: root
    ports:
      - "8000:8000"
    volumes:
      - "./docker/dynamodb:/home/dynamodblocal/data"
    healthcheck:
      test: curl http://dynamodb-local:8000
      interval: 1s
      timeout: 3s
      retries: 5